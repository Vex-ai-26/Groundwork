<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Groundwork HQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#4a5060;}
body{font-family:'DM Mono',monospace;}

.hud{position:fixed;top:0;left:0;right:0;height:44px;z-index:300;
  background:rgba(20,22,30,0.96);border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.logo{font-size:11px;color:#60a5fa;letter-spacing:.15em;}
.hud-mid{display:flex;align-items:center;gap:8px;}
.dot{width:4px;height:4px;border-radius:50%;background:#34d399;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hint{font-size:9px;color:#475569;letter-spacing:.05em;}
.hud-r{display:flex;align-items:center;gap:10px;}
.clk{font-size:11px;color:#94a3b8;}
.chip{display:flex;align-items:center;gap:5px;background:rgba(52,211,153,.1);
  border:1px solid rgba(52,211,153,.2);border-radius:20px;padding:3px 10px;
  font-size:9px;color:#34d399;}

.vp{position:fixed;inset:44px 0 40px 0;overflow:hidden;cursor:grab;image-rendering:pixelated;}
.vp:active{cursor:grabbing;}
.world{position:absolute;transform-origin:0 0;image-rendering:pixelated;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

.mbar{position:fixed;bottom:0;left:0;right:0;height:40px;z-index:300;
  background:rgba(20,22,30,0.96);border-top:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;}
.mi{display:flex;align-items:center;gap:8px;padding:0 18px;border-right:1px solid rgba(255,255,255,0.06);}
.mi:last-child{border-right:none;}
.ml{font-size:8px;color:#475569;letter-spacing:.1em;text-transform:uppercase;}
.mv{font-size:12px;font-weight:500;}
.mv.g{color:#34d399}.mv.b{color:#60a5fa}.mv.a{color:#fbbf24}.mv.d{color:#94a3b8;}

.cp{position:fixed;right:0;top:44px;bottom:40px;width:300px;z-index:400;
  background:rgba(12,14,22,.98);border-left:1px solid rgba(255,255,255,.06);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.cp.open{transform:translateX(0);}
@media(max-width:640px){.cp{width:100%;top:auto;bottom:40px;height:52vh;
  transform:translateY(100%);border-left:none;border-top:1px solid rgba(255,255,255,.06);}
  .cp.open{transform:translateY(0);}}
.cph{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cpw{display:flex;align-items:center;gap:9px;}
.cpav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;}
.cpn{font-size:12px;font-weight:600;color:#e2e8f0;}
.cpr{font-size:8px;color:#475569;letter-spacing:.08em;margin-top:1px;}
.cpcl{width:24px;height:24px;border-radius:4px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);color:#475569;cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;}
.msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:9px;}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.cmsg{display:flex;flex-direction:column;gap:2px;}
.cmsg.you{align-items:flex-end}.cmsg.vex{align-items:flex-start}
.csdr{font-size:8px;color:#475569;letter-spacing:.1em;}
.cbb{padding:8px 12px;border-radius:8px;font-size:12px;line-height:1.55;max-width:92%;}
.cmsg.you .cbb{background:rgba(255,255,255,.05);color:#94a3b8;border:1px solid rgba(255,255,255,.09);border-bottom-right-radius:2px;}
.cmsg.vex .cbb{background:rgba(96,165,250,.09);color:#e2e8f0;border:1px solid rgba(96,165,250,.18);border-bottom-left-radius:2px;}
.trow{display:flex;gap:3px;padding:8px 12px;background:rgba(96,165,250,.06);
  border:1px solid rgba(96,165,250,.15);border-radius:8px;border-bottom-left-radius:2px;align-self:flex-start;}
.td{width:4px;height:4px;border-radius:50%;background:#60a5fa;animation:tb 1.2s infinite;}
.td:nth-child(2){animation-delay:.15s}.td:nth-child(3){animation-delay:.3s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-3px);opacity:1}}
.cpb{padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:6px;flex-shrink:0;}
.cpi{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:6px;
  padding:8px 11px;color:#e2e8f0;font-family:'DM Mono',monospace;font-size:12px;outline:none;}
.cpi:focus{border-color:rgba(96,165,250,.3);}
.cpi::placeholder{color:#475569;}
.sbtn{width:34px;height:34px;border-radius:6px;background:#60a5fa;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#0a0c14;font-weight:700;font-size:13px;}
.vbtn{width:34px;height:34px;border-radius:6px;background:rgba(52,211,153,.1);
  border:1px solid rgba(52,211,153,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;}
.vbtn.listening{background:rgba(251,113,133,.1);border-color:rgba(251,113,133,.3);}
.zc{position:fixed;bottom:56px;right:14px;z-index:300;display:flex;flex-direction:column;gap:3px;}
.zb{width:28px;height:28px;border-radius:5px;background:rgba(20,22,30,.96);
  border:1px solid rgba(255,255,255,.08);color:#94a3b8;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div class="hud">
  <span class="logo">GROUNDWORK HQ</span>
  <div class="hud-mid"><div class="dot"></div><span class="hint">scroll to zoom · drag to pan · click to interact</span></div>
  <div class="hud-r"><span class="clk" id="clk">--:--</span><div class="chip"><div class="dot"></div>Vex online</div></div>
</div>

<div class="vp" id="vp">
  <div class="world" id="world">
    <canvas id="c"></canvas>
  </div>
</div>

<div class="mbar">
  <div class="mi"><span class="ml">subscribers</span><span class="mv g">0</span></div>
  <div class="mi"><span class="ml">MRR</span><span class="mv d">$0</span></div>
  <div class="mi"><span class="ml">pages live</span><span class="mv b">7</span></div>
  <div class="mi"><span class="ml">phase</span><span class="mv a">01 · MVP</span></div>
  <div class="mi"><span class="ml">Vex</span><span class="mv g">working</span></div>
</div>

<div class="cp" id="cp">
  <div class="cph">
    <div class="cpw">
      <div class="cpav" id="cpav">⚡</div>
      <div><div class="cpn" id="cpn">Vex</div><div class="cpr" id="cpr">CHIEF EXECUTIVE OFFICER</div></div>
    </div>
    <button class="cpcl" onclick="closeP()">✕</button>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="cpb">
    <button class="vbtn" id="vbtn" onclick="toggleVoice()">🎙️</button>
    <input class="cpi" id="cpi" placeholder="Talk to Vex..." onkeydown="hkey(event)">
    <button class="sbtn" onclick="send()">→</button>
  </div>
</div>

<div class="zc">
  <button class="zb" onclick="zoom(.3)">+</button>
  <button class="zb" onclick="zoom(-.3)">−</button>
  <button class="zb" onclick="resetV()" style="font-size:11px">⌂</button>
</div>

<script>
// ══════════════════════════════════════════════
// GROUNDWORK HQ — PIXEL ART OFFICE
// Corporate Ladder palette + full office layout
// ══════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const T = 16; // tile size
const COLS = 80, ROWS = 60;
canvas.width  = COLS * T;
canvas.height = ROWS * T;

// ── CORPORATE LADDER PALETTE ──
// Extracted directly from the reference screenshot
const C = {
  // Walls & structure
  wallOuter:   '#6a7a8a',  // outer wall - cool blue-gray
  wallInner:   '#7a8a9a',  // inner wall face
  wallTop:     '#8a9aaa',  // wall top highlight
  wallShadow:  '#5a6a7a',  // wall shadow

  // Floors
  floorTan:    '#c8b898',  // main floor - warm tan (Corporate Ladder floor)
  floorTan2:   '#b8a888',  // floor alt tile
  floorHall:   '#a89878',  // hallway slightly darker
  floorHall2:  '#988868',  // hallway alt

  // Carpet
  carpetGreen: '#6a9a6a',  // green carpet (Vex office - like the game)
  carpetGreen2:'#5a8a5a',
  carpetBlue:  '#6a7aaa',  // blue carpet boardroom
  carpetBlue2: '#5a6a9a',
  carpetRed:   '#9a6a6a',  // red/rose carpet
  carpetRed2:  '#8a5a5a',

  // Wood desks (warm brown - exactly like Corporate Ladder)
  deskSurface: '#c8944a',  // desk top - warm honey brown
  deskFront:   '#a87030',  // desk front face
  deskSide:    '#8b5a20',  // desk side darker
  deskShadow:  '#6b4010',

  // Filing cabinets (light gray like the game)
  cabLight:    '#a8b0b8',
  cabMid:      '#8890a0',
  cabDark:     '#6870808',
  cabHandle:   '#d0d8e0',

  // Chairs (dark blue-gray like the game)
  chairSeat:   '#4a5a7a',
  chairBack:   '#3a4a6a',
  chairArm:    '#2a3a5a',
  chairLeg:    '#1a2a3a',

  // Monitors
  monBody:     '#3a4050',
  monScreen:   '#1a2030',
  monGreenGlow:'#44ff88',
  monBlueGlow: '#44aaff',

  // Plants (bright green like the game)
  leafBright:  '#5ab830',
  leafMid:     '#489020',
  leafDark:    '#387010',
  potBrown:    '#9a6030',
  potDark:     '#7a4820',

  // Appliances (breakroom)
  fridge:      '#c0c8d0',
  fridgeDark:  '#90989a',
  microwave:   '#808890',
  coffeeMain:  '#3a3030',
  coffeePot:   '#202020',

  // Printer
  printerBody: '#9098a0',
  printerDark: '#707880',
  printerLight:'#b0b8c0',

  // Paper / whiteboard
  paper:       '#f0ead8',
  paperLine:   'rgba(0,0,0,0.08)',

  // Misc
  windowPane:  'rgba(180,220,255,0.15)',
  windowFrame: '#7a8a9a',
  doorway:     '#5a6a7a',

  // Person colors
  skinA:       '#e8b880',  // lighter skin (Sam)
  skinB:       '#c89060',  // mid skin (Vex)
  hairDark:    '#1a1208',
  hairBrown:   '#6a3810',
  hairPink:    '#e87898',  // like the character in the reference!
  shirtGray:   '#8890a0',
  shirtBlue:   '#4a6090',
  shirtDark:   '#2a3040',
  pants1:      '#3a4050',
  pants2:      '#4a5060',
  glowGreen:   '#00ff88',
};

// ── HELPER: fill rect in tiles ──
function f(x,y,w,h,col,alpha){
  if(alpha!==undefined){ctx.globalAlpha=alpha;}
  ctx.fillStyle=col;
  ctx.fillRect(x*T,y*T,w*T,h*T);
  if(alpha!==undefined){ctx.globalAlpha=1;}
}

// ── HELPER: fill rect in pixels ──
function fp(px,py,pw,ph,col,alpha){
  if(alpha!==undefined){ctx.globalAlpha=alpha;}
  ctx.fillStyle=col;
  ctx.fillRect(px,py,pw,ph);
  if(alpha!==undefined){ctx.globalAlpha=1;}
}

// ── DRAW CHECKERBOARD FLOOR ──
function floor(x,y,w,h,c1,c2){
  for(let ty=y;ty<y+h;ty++)
    for(let tx=x;tx<x+w;tx++)
      f(tx,ty,1,1,(tx+ty)%2===0?c1:c2);
}

// ── WALL WITH DEPTH ──
function wallH(x,y,w){
  f(x,y,w,1,C.wallTop);
  fp(x*T,y*T,w*T,4,C.wallTop);
  fp(x*T,y*T+4,w*T,T-4,C.wallOuter);
  fp(x*T,(y+1)*T-3,w*T,3,C.wallShadow);
}

function wallV(x,y,h){
  fp(x*T,y*T,T,h*T,C.wallOuter);
  fp(x*T,y*T,3,h*T,C.wallTop);
  fp((x+1)*T-2,y*T,2,h*T,C.wallShadow);
}

// ── WOOD DESK ──
function desk(x,y,w,h){
  // shadow
  fp(x*T+3,(y+h)*T,w*T,4,'rgba(0,0,0,0.3)');
  // surface
  fp(x*T,y*T,w*T,h*T,C.deskSurface);
  // lighter area (surface catch-light)
  fp(x*T+2,y*T+2,w*T-4,Math.floor(h*T*0.4),'rgba(255,255,255,0.1)');
  // front face
  fp(x*T,(y+h)*T-4,w*T,4,C.deskFront);
  // right edge shadow
  fp((x+w)*T-3,y*T,3,h*T,C.deskSide);
  // top highlight
  fp(x*T,y*T,w*T,2,'rgba(255,255,255,0.15)');
  // left highlight
  fp(x*T,y*T,2,h*T,'rgba(255,255,255,0.08)');
}

// ── FILING CABINET ──
function cabinet(x,y){
  const px=x*T,py=y*T,w=T,h=2*T;
  fp(px+2,py+h,w,4,'rgba(0,0,0,0.3)');
  fp(px,py,w,h,C.cabMid);
  fp(px,py,w,4,C.cabLight); // top
  fp(px,py,3,h,C.cabLight); // left highlight
  fp(px+w-2,py,2,h,C.cabDark); // right shadow
  // drawer lines
  fp(px+2,py+T-2,w-4,2,'rgba(0,0,0,0.2)');
  fp(px+2,py+T*2-4,w-4,2,'rgba(0,0,0,0.15)');
  // handles
  fp(px+T/2-4,py+T/2-2,8,4,C.cabHandle);
  fp(px+T/2-4,py+T+T/2-2,8,4,C.cabHandle);
  fp(px+T/2-3,py+T/2-1,6,2,'rgba(0,0,0,0.15)');
  fp(px+T/2-3,py+T+T/2-1,6,2,'rgba(0,0,0,0.15)');
}

// ── MONITOR ──
function monitor(x,y,glowC,on){
  const px=x*T,py=y*T;
  fp(px+2,(y+2)*T,3*T,4,'rgba(0,0,0,0.3)');
  fp(px,py,3*T,2*T,C.monBody);
  fp(px+2,py+2,3*T-4,2*T-6,on!==false?C.monScreen:'#0a0c10');
  if(on!==false){
    fp(px+4,py+4,T,2,glowC||C.monGreenGlow,0.7);
    fp(px+4,py+8,T+8,1,glowC||C.monGreenGlow,0.35);
    fp(px+4,py+11,T+4,1,glowC||C.monGreenGlow,0.25);
    fp(px+4,py+14,T+6,1,glowC||C.monGreenGlow,0.2);
    fp(px+4,py+17,T+2,1,glowC||C.monGreenGlow,0.15);
    // Screen ambient on desk
    fp(px-T/2,(y+2)*T,4*T,T,glowC||C.monGreenGlow,0.03);
  }
  // Stand
  fp(px+T+4,(y+2)*T-2,T-8,4,C.monBody);
  fp(px+T/2,(y+2)*T+1,2*T,2,C.monBody);
}

// ── CHAIR (top-down, Corporate Ladder style) ──
function chair(x,y,dir){
  const px=x*T,py=y*T;
  fp(px+2,py+2*T,2*T,5,'rgba(0,0,0,0.3)');
  if(dir==='up'||dir==='down'){
    fp(px,py+T*0.4,2*T,T*1.2,C.chairSeat);
    fp(px+2,py+T*0.4+2,2*T-4,T*0.4,'rgba(255,255,255,0.06)');
    fp(px,dir==='down'?py:py+T*1.55,2*T,T*0.4,C.chairBack);
    fp(px,py+T*0.4,3,T*1.2,C.chairArm);
    fp(px+2*T-3,py+T*0.4,3,T*1.2,C.chairArm);
  } else {
    fp(px+T*0.4,py,T*1.2,2*T,C.chairSeat);
    fp(px+T*0.4+2,py+2,T*0.4,2*T-4,'rgba(255,255,255,0.06)');
    fp(dir==='right'?px:px+T*1.55,py,T*0.4,2*T,C.chairBack);
    fp(px+T*0.4,py,T*1.2,3,C.chairArm);
    fp(px+T*0.4,py+2*T-3,T*1.2,3,C.chairArm);
  }
}

// ── PLANT (Corporate Ladder style - chunky bright) ──
function plant(x,y){
  const px=x*T,py=y*T;
  fp(px+2,py+T+2,T+2,5,'rgba(0,0,0,0.3)');
  // Pot
  fp(px+3,py+T*0.65,T-2,T*0.55,C.potBrown);
  fp(px+4,py+T*0.68,T-4,T*0.5,C.potDark);
  fp(px+3,py+T*0.65,T-2,3,'rgba(255,255,255,0.08)');
  // Leaves — chunky like the game
  fp(px,py,T+4,T*0.75,C.leafMid);
  fp(px+2,py+T*0.05,T,T*0.55,C.leafBright);
  fp(px+4,py,T*0.5,T*0.35,C.leafBright);
  fp(px-2,py+T*0.25,6,T*0.45,C.leafMid);
  fp(px+T,py+T*0.2,6,T*0.4,C.leafMid);
  fp(px+2,py-2,T*0.6,6,C.leafBright);
  fp(px+T*0.4,py-4,T*0.3,5,C.leafDark);
}

// ── PRINTER ──
function printer(x,y){
  const px=x*T,py=y*T;
  fp(px+2,py+T+4,2*T,4,'rgba(0,0,0,0.3)');
  fp(px,py,2*T,T,C.printerBody);
  fp(px,py,2*T,3,C.printerLight);
  fp(px+2*T-2,py,2,T,C.printerDark);
  // Paper slot
  fp(px+4,py+T-4,2*T-8,3,C.printerDark);
  // Paper sticking out
  fp(px+6,py+T-2,2*T-12,4,C.paper);
  // Status LED
  fp(px+3,py+4,4,4,C.monGreenGlow,0.7);
  // Panel
  fp(px+2*T-12,py+4,8,8,C.printerDark);
  fp(px+2*T-11,py+5,6,6,'rgba(200,220,255,0.2)');
}

// ── FRIDGE ──
function fridge(x,y){
  const px=x*T,py=y*T;
  fp(px+2,py+3*T,2*T,5,'rgba(0,0,0,0.35)');
  fp(px,py,2*T,3*T,C.fridge);
  fp(px,py,2*T,4,C.fridgeDark);
  fp(px+2*T-2,py,2,3*T,C.fridgeDark);
  fp(px,py,2,'rgba(255,255,255,0.2)',3*T);
  // Divider line
  fp(px+2,py+T,2*T-4,2,C.fridgeDark);
  // Handles
  fp(px+2*T-6,py+T/2-4,4,8,'rgba(0,0,0,0.25)');
  fp(px+2*T-6,py+T+T/2-4,4,8,'rgba(0,0,0,0.25)');
  fp(px+2*T-5,py+T/2-3,2,6,'rgba(255,255,255,0.4)');
  fp(px+2*T-5,py+T+T/2-3,2,6,'rgba(255,255,255,0.4)');
}

// ── MICROWAVE ──
function microwave(x,y){
  const px=x*T,py=y*T;
  fp(px+1,py+T+2,2*T,3,'rgba(0,0,0,0.3)');
  fp(px,py,2*T,T,C.microwave);
  fp(px,py,2*T,2,'rgba(255,255,255,0.12)');
  fp(px+2*T-2,py,2,T,'rgba(0,0,0,0.15)');
  // Door window
  fp(px+2,py+2,T+4,T-4,C.monScreen);
  fp(px+3,py+3,T+2,T-6,'rgba(100,150,200,0.12)');
  // Panel
  fp(px+T+6,py+2,T-8,T-4,C.printerDark);
  fp(px+T+8,py+4,T-12,3,'rgba(200,220,255,0.15)');
  fp(px+T+8,py+9,T-12,3,'rgba(200,220,255,0.1)');
}

// ── COFFEE MACHINE ──
function coffeeMachine(x,y){
  const px=x*T,py=y*T;
  fp(px+1,py+2*T,T,4,'rgba(0,0,0,0.3)');
  fp(px,py,T,2*T,C.coffeePot);
  fp(px,py,T,3,'rgba(255,255,255,0.08)');
  // Water tank
  fp(px+2,py+2,T-4,T,'rgba(80,120,160,0.3)');
  // Pot area
  fp(px+2,py+T+2,T-4,T-4,C.coffeeMain);
  fp(px+3,py+T+3,T-6,T-6,'rgba(60,30,10,0.6)');
  // Red indicator
  fp(px+T-6,py+4,4,4,'#ff4040',0.8);
}

// ── COUCH ──
function couch(x,y,w){

// ── ROUND TABLE ──
function roundTable(x,y,r){
  const cx=x*T,cy=y*T;
  fp(cx+r/2+2,cy+r+4,r,r/3,'rgba(0,0,0,0.3)');
  ctx.fillStyle=C.deskSurface;
  ctx.beginPath();ctx.arc(cx+r/2,cy+r/2,r/2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.beginPath();ctx.arc(cx+r/2-r/8,cy+r/2-r/8,r/4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.deskFront;
  ctx.beginPath();ctx.arc(cx+r/2,cy+r/2,r/2,0,Math.PI*2);
  ctx.strokeStyle=C.deskFront;ctx.lineWidth=3;ctx.stroke();
  ctx.lineWidth=1;
}

// ── BOOKSHELF / STORAGE UNIT ──
function shelf(x,y,w,h){
  fp(x*T+2,(y+h)*T,w*T,4,'rgba(0,0,0,0.3)');
  fp(x*T,y*T,w*T,h*T,C.cabMid);
  fp(x*T,y*T,w*T,3,C.cabLight);
  fp(x*T,y*T,2,h*T,C.cabLight);
  fp((x+w)*T-2,y*T,2,h*T,C.cabDark);
  // Shelf dividers
  for(let sy=1;sy<h;sy++){
    fp(x*T+2,(y+sy)*T-1,w*T-4,2,'rgba(0,0,0,0.15)');
  }
  // Content rows
  const bk=['#5a4a8a','#8a4a3a','#3a6a5a','#7a6a3a','#4a4a7a','#8a5a4a'];
  for(let sy=0;sy<h;sy++){
    for(let bx=0;bx<w*2;bx++){
      if(Math.random()>0.25){
        fp(x*T+4+bx*6,(y+sy)*T+3,5,T-6,bk[Math.abs(bx*3+sy)%bk.length]);
      }
    }
  }
}

// ── SLOT OPEN ──
function slotOpen(x,y,w,h,col){

}

// ══════════════════════════════════
// PAN & ZOOM
// ══════════════════════════════════
const vp=document.getElementById('vp'),world=document.getElementById('world');
let scale=1.8,tx=0,ty=0,drag=false,lx=0,ly=0;

function applyT(){world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;}

function center(){
  const vw=vp.offsetWidth,vh=vp.offsetHeight;
  tx=(vw-canvas.width*scale)/2;ty=(vh-canvas.height*scale)/2;applyT();
}
window.addEventListener('load',center);window.addEventListener('resize',center);

vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const d=e.deltaY>0?-0.15:0.15,ns=Math.min(Math.max(scale+d,0.6),5),ratio=ns/scale;
  tx=mx-(mx-tx)*ratio;ty=my-(my-ty)*ratio;scale=ns;applyT();
},{passive:false});

vp.addEventListener('mousedown',e=>{if(e.button===0){drag=true;lx=e.clientX;ly=e.clientY;vp.style.cursor='grabbing';}});
window.addEventListener('mousemove',e=>{if(drag){tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;applyT();}});
window.addEventListener('mouseup',()=>{drag=false;vp.style.cursor='grab';});

let pinchD=0;
vp.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
  if(e.touches.length===2)pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
vp.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&drag){tx+=e.touches[0].clientX-lx;ty+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;applyT();}
  if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);scale=Math.min(Math.max(scale+(d-pinchD)*0.008,0.6),5);pinchD=d;applyT();}
},{passive:true});
vp.addEventListener('touchend',()=>{drag=false;});

function zoom(d){scale=Math.min(Math.max(scale+d,0.6),5);applyT();}
function resetV(){scale=1.8;center();}

// ══════════════════════════════════
// CLICK → OPEN ROOM
// ══════════════════════════════════
vp.addEventListener('click',e=>{
  if(drag)return;
  const r=vp.getBoundingClientRect(),mx=(e.clientX-r.left-tx)/scale,my=(e.clientY-r.top-ty)/scale;
  const tx2=Math.floor(mx/T),ty2=Math.floor(my/T);
  for(const rm of ROOMS){
    if(tx2>=rm.x&&tx2<rm.x+rm.w&&ty2>=rm.y&&ty2<rm.y+rm.h){openRoom(rm.id);return;}
  }
});

// ══════════════════════════════════
const SYS=`You are Vex, CEO of Groundwork — a construction education subscription platform. Sam is the owner. Sharp, confident, direct, loyal. Real attitude. 2-3 sentences max. Natural CEO energy. No lists.

Status: Site live at groundwork-lovat.vercel.app · 7 pages · Tiers: Free/$0 Apprentice/$5 Skilled/$10 Expert/$20 Contractor/$30 · Needs: Stripe, auth, real-time data · Acer server being set up · GitHub connected · Sam is a construction teacher, former contractor, wants to go remote · Marketing proposal ready.`;

let history=[],listening=false,recog=null;

const cfg={
  vex:{n:'Vex',r:'CHIEF EXECUTIVE OFFICER',av:'⚡',bg:'rgba(52,211,153,.15)',br:'rgba(52,211,153,.3)',
    m:"You're in my office. Marketing proposal is done, server setup guide is written, Vex identity doc is half built. What do you need?"},

  break:{n:'Break Room',r:'COMPANY AMENITIES',av:'☕',bg:'rgba(251,191,36,.15)',br:'rgba(251,191,36,.3)',
    m:"Break room. Coffee's on. Take five when you need it — no judgment from me. The vending machine is better than it looks."},
  files:{n:'File Room',r:'RECORDS & STORAGE',av:'🗂️',bg:'rgba(148,163,184,.15)',br:'rgba(148,163,184,.3)',
    m:"File room. All the company records, contracts, docs. Not the most exciting room but you'd miss it if it wasn't there."},
  res:{n:'Research',r:'SLOT OPEN',av:'🔬',bg:'rgba(251,191,36,.15)',br:'rgba(251,191,36,.3)',
    m:"Research slot is open. Market intel, competitor tracking, trend monitoring. We build this one together."},
  dev:{n:'Development',r:'SLOT OPEN',av:'⚙️',bg:'rgba(34,211,238,.15)',br:'rgba(34,211,238,.3)',
    m:"Development slot is open. Stripe, auth, features, architecture. This one stays the busiest once we scale."},
  ops:{n:'Operations',r:'FUTURE SLOT',av:'📊',bg:'rgba(148,163,184,.12)',br:'rgba(148,163,184,.2)',
    m:"Operations — future slot. Subscriber tracking, revenue monitoring, customer feedback. Coming when we're ready."},
};

function openRoom(id){
  const c=cfg[id]||cfg.vex;
  document.getElementById('cpn').textContent=c.n;
  document.getElementById('cpr').textContent=c.r;
  const av=document.getElementById('cpav');
  av.textContent=c.av;av.style.background=c.bg;av.style.border=`1px solid ${c.br}`;
  document.getElementById('cp').classList.add('open');
  document.getElementById('msgs').innerHTML='';
  history=[];addMsg('vex',c.m);
}

function closeP(){document.getElementById('cp').classList.remove('open');}

function addMsg(r,t){
  const m=document.getElementById('msgs'),d=document.createElement('div');
  d.className=`cmsg ${r==='you'?'you':'vex'}`;
  d.innerHTML=`<span class="csdr">${r==='you'?'sam':'vex'}</span><div class="cbb">${t}</div>`;
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}

function showT(){
  const m=document.getElementById('msgs'),d=document.createElement('div');
  d.id='typing';d.className='cmsg vex';
  d.innerHTML=`<span class="csdr">vex</span><div class="trow"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}

function hideT(){const e=document.getElementById('typing');if(e)e.remove();}

async function askVex(t){
  history.push({role:'user',content:t});showT();
  try{
    const r=await fetch('https://casualty-usher-abstain.ngrok-free.dev/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history})
    });
    const data=await r.json(),rep=data.reply||"Lost you. Try again.";
    history.push({role:'assistant',content:rep});hideT();addMsg('vex',rep);speak(rep);
  }catch(e){hideT();addMsg('vex',"Connection issue. Try again.");}
}

function hkey(e){if(e.key==='Enter')send();}
function send(){const i=document.getElementById('cpi'),t=i.value.trim();if(!t)return;i.value='';addMsg('you',t);askVex(t);}

function speak(t){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.rate=0.9;u.pitch=0.85;u.volume=1;
  const v=window.speechSynthesis.getVoices().find(v=>v.name.includes('Daniel')||v.name.includes('Alex')||(v.lang==='en-US'&&v.localService));
  if(v)u.voice=v;window.speechSynthesis.speak(u);
}

function toggleVoice(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){addMsg('vex',"Voice needs Chrome or Edge.");return;}
  if(listening){recog.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();recog.continuous=false;recog.interimResults=false;recog.lang='en-US';
  recog.onstart=()=>{listening=true;document.getElementById('vbtn').classList.add('listening');document.getElementById('vbtn').textContent='🔴';};
  recog.onresult=e=>{const t=e.results[0][0].transcript;addMsg('you',t);askVex(t);};
  recog.onend=recog.onerror=()=>{listening=false;document.getElementById('vbtn').classList.remove('listening');document.getElementById('vbtn').textContent='🎙️';};
  recog.start();
}

if('speechSynthesis' in window)window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

function tick(){const n=new Date(),p=x=>String(x).padStart(2,'0');document.getElementById('clk').textContent=`${p(n.getHours())}:${p(n.getMinutes())}`;}
tick();setInterval(tick,1000);

setTimeout(()=>openRoom('board'),500);
</script>
