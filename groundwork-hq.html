<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groundwork HQ</title>
<style>
:root {
  --bg: #0d1117;
  --panel: #1A1E2A;
  --border: #2a2f3d;
  --amber: #C8960A;
  --amber-bright: #f5a623;
  --text: #F5F0E8;
  --text-secondary: #C8B898;
  --green: #2d6a4f;
  --green-bright: #52b788;
  --red: #9b2226;
  --red-bright: #e63946;
  --blue: #1d3557;
  --blue-bright: #457b9d;
  --purple: #4a1942;
  --purple-bright: #9b5de5;
  --input-bg: #12161f;
  --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'Cascadia Code', 'SF Mono', 'Consolas', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  font-size: 14px;
  overflow: hidden;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--amber); }

/* TOP BAR */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  z-index: 100;
}
#topbar-brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#topbar-brand .brand-name { font-size: 15px; font-weight: 700; color: var(--amber); letter-spacing: 0.08em; }
#topbar-brand .hq-badge { background: var(--amber); color: #0d1117; font-size: 10px; font-weight: 800; letter-spacing: 0.1em; padding: 2px 6px; border-radius: 3px; }
#topbar-clock { flex: 1; text-align: center; color: var(--text-secondary); font-size: 13px; font-variant-numeric: tabular-nums; }
#topbar-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-bright); flex-shrink: 0; }
.conn-dot.offline { background: var(--red-bright); }
#conn-label { font-size: 12px; color: var(--text-secondary); }
#cost-badge { font-size: 12px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
#mrr-badge { background: rgba(200,150,10,0.12); color: var(--amber); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; cursor: pointer; }
#mrr-badge.positive { background: var(--green); color: var(--green-bright); }
#settings-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; transition: color 0.15s; line-height: 1; }
#settings-btn:hover { color: var(--amber); }

#offline-banner { display: none; position: fixed; top: 48px; left: 0; right: 0; background: rgba(200,150,10,0.15); border-bottom: 1px solid var(--amber); color: var(--amber-bright); font-size: 12px; text-align: center; padding: 6px; z-index: 99; }

/* LAYOUT */
#layout {
  position: fixed;
  top: 48px; bottom: 0; left: 0; right: 0;
  display: grid;
  grid-template-columns: 260px 1fr 360px;
}

.panel { overflow-y: auto; border-right: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 12px; }
#panel-right { border-right: none; border-left: 1px solid var(--border); }
#panel-center { border-right: none; }

/* SECTION HEADERS */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); }
.section-action { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 3px; transition: color 0.15s; }
.section-action:hover { color: var(--amber); }

/* AGENT CARDS */
.agent-cards-wrap { display: flex; flex-direction: column; gap: 6px; }
.agent-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; cursor: pointer; transition: border-color 0.15s; position: relative; }
.agent-card:hover { border-color: var(--amber); }
.agent-card.working { animation: agentGlow 1.5s infinite; }
.agent-card.slot-open { opacity: 0.55; cursor: default; }
.agent-card.slot-open:hover { border-color: var(--border); }
.agent-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.agent-name { font-weight: 700; font-size: 13px; }
.agent-role { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
.agent-current { font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-last { font-size: 10px; color: var(--text-secondary); opacity: 0.7; margin-top: 2px; }
.agent-activates { font-size: 10px; color: var(--text-secondary); font-style: italic; margin-top: 4px; opacity: 0.7; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot.online  { background: var(--green-bright); }
.status-dot.working { background: var(--amber); animation: dotPulse 1s infinite; }
.status-dot.offline { background: var(--red-bright); }
.status-dot.grey    { background: #555; }

@keyframes agentGlow { 0%,100% { box-shadow: 0 0 8px #C8960A44; border-color: #C8960A66; } 50% { box-shadow: 0 0 20px #C8960Acc; border-color: var(--amber); } }
@keyframes dotPulse  { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* TODOS */
.todo-input-row { display: flex; gap: 6px; margin-bottom: 8px; }
.todo-input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 6px 10px; font-size: 12px; font-family: var(--font-main); outline: none; transition: border-color 0.15s; }
.todo-input:focus { border-color: var(--amber); }
.todo-filters { display: flex; gap: 4px; margin-bottom: 8px; }
.todo-filter-btn { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text-secondary); cursor: pointer; font-size: 10px; padding: 2px 8px; transition: all 0.15s; }
.todo-filter-btn.active, .todo-filter-btn:hover { background: rgba(200,150,10,0.1); border-color: var(--amber); color: var(--amber); }
.todo-list { display: flex; flex-direction: column; gap: 4px; }
.todo-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 8px; background: var(--input-bg); border-radius: 4px; border: 1px solid var(--border); }
.todo-item.done { opacity: 0.6; }
.todo-item input[type="checkbox"] { margin-top: 2px; accent-color: var(--amber); cursor: pointer; flex-shrink: 0; }
.todo-text { flex: 1; font-size: 12px; line-height: 1.4; }
.todo-item.done .todo-text { text-decoration: line-through; }
.todo-meta { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.todo-by-chip { font-size: 9px; padding: 1px 5px; border-radius: 2px; background: var(--border); color: var(--text-secondary); }
.todo-time { font-size: 10px; color: var(--text-secondary); opacity: 0.7; }
.todo-del { background: none; border: none; color: var(--border); cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; transition: color 0.15s; }
.todo-del:hover { color: var(--red-bright); }
.empty-state { color: var(--text-secondary); font-size: 12px; text-align: center; padding: 16px; opacity: 0.6; }

/* BRIEFING */
#briefing-card { background: var(--panel); border: 1px solid var(--border); border-left: 3px solid var(--amber); border-radius: 6px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; flex-shrink: 0; }
#briefing-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; }
#briefing-date { font-size: 12px; font-weight: 700; color: var(--amber); }
#briefing-controls { display: flex; gap: 8px; align-items: center; }
#briefing-refresh { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 13px; transition: color 0.15s; }
#briefing-refresh:hover { color: var(--amber); }
#briefing-toggle { font-size: 11px; color: var(--text-secondary); pointer-events: none; }
#briefing-body { padding: 0 14px 12px; background: rgba(200,150,10,0.03); }
#briefing-body.collapsed { display: none; }
#briefing-text { font-size: 12px; line-height: 1.7; color: var(--text-secondary); white-space: pre-wrap; max-height: 260px; overflow-y: auto; }

/* ACTIVITY FEED */
#activity-section { display: flex; flex-direction: column; min-height: 180px; }
#activity-feed { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; overflow-y: auto; font-family: var(--font-mono); font-size: 11px; min-height: 120px; max-height: 260px; }
.feed-entry { display: flex; gap: 8px; padding: 2px 0; line-height: 1.5; word-break: break-word; }
.feed-time { color: var(--text-secondary); opacity: 0.6; flex-shrink: 0; }
.feed-agent { font-weight: 700; flex-shrink: 0; min-width: 50px; }
.feed-msg { flex: 1; color: var(--text-secondary); }
.feed-agent.vex { color: var(--amber); }
.feed-agent.maya { color: var(--blue-bright); }
.feed-agent.iris { color: var(--purple-bright); }
.feed-agent.rex { color: var(--green-bright); }
.feed-agent.system { color: var(--text-secondary); }
.feed-entry.type-error .feed-agent { color: var(--red-bright); }
.feed-entry.type-git_push .feed-agent { color: #666; }

/* VAULT */
#vault-grid { display: flex; flex-direction: column; gap: 4px; }
.vault-file-card { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; transition: border-color 0.15s; }
.vault-file-card:hover { border-color: var(--amber); }
.vault-icon { font-size: 14px; flex-shrink: 0; }
.vault-name { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vault-meta { display: flex; gap: 5px; align-items: center; }
.agent-chip { font-size: 9px; padding: 1px 5px; border-radius: 2px; font-weight: 700; text-transform: uppercase; }
.chip-vex  { background: rgba(200,150,10,0.15); color: var(--amber); }
.chip-maya { background: rgba(69,123,157,0.2); color: var(--blue-bright); }
.chip-iris { background: rgba(155,93,229,0.15); color: var(--purple-bright); }
.chip-rex  { background: rgba(82,183,136,0.15); color: var(--green-bright); }
.chip-sys  { background: var(--border); color: var(--text-secondary); }
.vault-mtime { font-size: 10px; color: var(--text-secondary); opacity: 0.6; }

/* FINANCIALS */
#financials-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.metric-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; cursor: pointer; transition: border-color 0.15s; min-height: 62px; display: flex; flex-direction: column; justify-content: space-between; }
.metric-card.readonly { cursor: default; }
.metric-card:not(.readonly):hover { border-color: var(--amber); }
.metric-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 4px; }
.metric-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
.metric-value.positive { color: var(--green-bright); }
.metric-value.amber    { color: var(--amber); }
.metric-value.red      { color: var(--red-bright); }
.metric-input { width: 100%; background: var(--input-bg); border: 1px solid var(--amber); border-radius: 3px; color: var(--text); font-size: 15px; font-weight: 700; padding: 3px 6px; font-family: var(--font-main); outline: none; }
.progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--amber); border-radius: 2px; transition: width 0.3s; }
.metric-card.full-width { grid-column: span 2; }

/* CHAT */
#panel-right { display: flex; flex-direction: column; padding: 0; gap: 0; overflow: hidden; }
#chat-titlebar { display: flex; align-items: center; gap: 8px; padding: 12px 14px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#chat-title { font-size: 13px; font-weight: 700; color: var(--amber); }
#chat-status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-bright); }
#chat-messages { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.msg { display: flex; flex-direction: column; max-width: 90%; }
.msg.sam { align-self: flex-end; align-items: flex-end; }
.msg.vex { align-self: flex-start; align-items: flex-start; }
.msg-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.msg.vex .msg-label { color: var(--amber); }
.msg.sam .msg-label { color: var(--text-secondary); }
.msg-bubble { padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.6; max-width: 100%; word-break: break-word; }
.msg.vex .msg-bubble { background: rgba(200,150,10,0.07); border: 1px solid var(--border); border-radius: 8px 8px 8px 2px; color: var(--text); }
.msg.sam .msg-bubble { background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px 8px 2px 8px; color: var(--text); }
.msg-time { font-size: 10px; color: var(--text-secondary); opacity: 0.5; margin-top: 3px; }
.msg.vex .msg-bubble strong { color: var(--amber-bright); }
.msg.vex .msg-bubble em { font-style: italic; color: var(--text-secondary); }
.msg.vex .msg-bubble code { background: var(--input-bg); padding: 1px 5px; border-radius: 3px; font-family: var(--font-mono); font-size: 12px; color: var(--green-bright); }
.msg.vex .msg-bubble pre { background: var(--input-bg); padding: 10px 12px; border-radius: 5px; border: 1px solid var(--border); overflow-x: auto; margin: 6px 0; }
.msg.vex .msg-bubble pre code { background: none; padding: 0; font-size: 11px; }
.msg.vex .msg-bubble ul, .msg.vex .msg-bubble ol { padding-left: 18px; margin: 4px 0; }
.msg.vex .msg-bubble li { margin: 2px 0; }
.msg.vex .msg-bubble h1, .msg.vex .msg-bubble h2, .msg.vex .msg-bubble h3 { color: var(--amber); margin: 8px 0 4px; font-size: 13px; }

#typing-indicator { display: none; align-self: flex-start; padding: 8px 14px; background: rgba(200,150,10,0.07); border: 1px solid var(--border); border-radius: 8px; }
.typing-dots { display: flex; gap: 4px; align-items: center; height: 12px; }
.typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); animation: typingBounce 1s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.15s; }
.typing-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: 1; } 30% { transform: translateY(-5px); opacity: 0.6; } }

#quick-actions { display: flex; gap: 5px; padding: 6px 14px; overflow-x: auto; border-top: 1px solid var(--border); flex-shrink: 0; }
#quick-actions::-webkit-scrollbar { height: 3px; }
.qa-btn { background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; color: var(--text-secondary); cursor: pointer; font-size: 11px; padding: 4px 10px; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
.qa-btn:hover { border-color: var(--amber); color: var(--amber); }

#chat-input-area { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; background: var(--panel); }
#chat-input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: var(--font-main); padding: 8px 12px; outline: none; resize: none; max-height: 88px; min-height: 36px; line-height: 1.5; transition: border-color 0.15s; }
#chat-input:focus { border-color: var(--amber); }
#chat-send { background: var(--amber); border: none; border-radius: 7px; color: #0d1117; cursor: pointer; font-size: 14px; font-weight: 700; padding: 8px 12px; transition: background 0.15s; height: 36px; display: flex; align-items: center; }
#chat-send:hover { background: var(--amber-bright); }
#mic-btn { background: var(--input-bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 8px 10px; height: 36px; display: flex; align-items: center; transition: all 0.15s; }
#mic-btn:hover { border-color: var(--amber); color: var(--amber); }
#mic-btn.recording { border-color: var(--red-bright); color: var(--red-bright); animation: micPulse 1s infinite; }
@keyframes micPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.4); } 50% { box-shadow: 0 0 0 5px rgba(230,57,70,0); } }

/* MODALS */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative; }
.modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 18px; transition: color 0.15s; }
.modal-close:hover { color: var(--text); }
.modal h2 { font-size: 15px; color: var(--amber); margin-bottom: 4px; }
.modal .modal-role { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }
.modal textarea, .modal input[type="text"], .modal input[type="url"] { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; font-family: var(--font-main); padding: 10px 12px; outline: none; transition: border-color 0.15s; margin-bottom: 10px; resize: vertical; }
.modal textarea:focus, .modal input:focus { border-color: var(--amber); }
.modal textarea { min-height: 80px; }
.modal-submit { background: var(--amber); border: none; border-radius: 5px; color: #0d1117; cursor: pointer; font-size: 13px; font-weight: 700; padding: 9px 20px; transition: background 0.15s; }
.modal-submit:hover { background: var(--amber-bright); }
.modal-danger { background: none; border: 1px solid var(--red-bright); border-radius: 5px; color: var(--red-bright); cursor: pointer; font-size: 12px; padding: 7px 14px; transition: all 0.15s; }
.modal-danger:hover { background: var(--red); }
.modal-slot-msg { background: var(--input-bg); border: 1px solid var(--border); border-radius: 5px; padding: 12px 14px; font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
.modal-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); margin-bottom: 6px; display: block; }
.vault-breadcrumb { font-size: 11px; color: var(--text-secondary); opacity: 0.7; font-family: var(--font-mono); }
.vault-modal-meta { display: flex; gap: 8px; align-items: center; margin: 6px 0 12px; }
.vault-copy-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text-secondary); cursor: pointer; font-size: 11px; padding: 4px 10px; transition: all 0.15s; margin-bottom: 10px; }
.vault-copy-btn:hover { border-color: var(--amber); color: var(--amber); }
#vault-modal-content { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; overflow-y: auto; max-height: 55vh; font-size: 13px; line-height: 1.7; color: var(--text-secondary); white-space: pre-wrap; }
#vault-modal-content h1, #vault-modal-content h2, #vault-modal-content h3 { color: var(--amber); margin: 10px 0 5px; white-space: normal; }
#vault-modal-content strong { color: var(--text); }
#vault-modal-content code { font-family: var(--font-mono); font-size: 11px; background: var(--border); padding: 1px 4px; border-radius: 2px; }

/* SHIMMER */
.shimmer { background: linear-gradient(90deg, var(--panel) 25%, #222630 50%, var(--panel) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 5px; height: 14px; margin-bottom: 8px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.shimmer-card { height: 50px; border-radius: 6px; margin-bottom: 5px; }

/* MOBILE */
@media (max-width: 768px) {
  html, body { overflow-y: auto; }
  #layout { position: static; display: flex; flex-direction: column; height: auto; }
  .panel { overflow: visible; border-right: none; border-bottom: 1px solid var(--border); }
  #panel-right { border-left: none; height: 600px; order: -1; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-brand">
    <span class="brand-name">GROUNDWORK</span>
    <span class="hq-badge">HQ</span>
  </div>
  <div id="topbar-clock">Loading...</div>
  <div id="topbar-right">
    <div id="conn-dot" class="conn-dot"></div>
    <span id="conn-label">Connecting</span>
    <span id="cost-badge">$0.00 today</span>
    <div id="mrr-badge">$0 MRR</div>
    <button id="settings-btn" title="Settings">&#9881;</button>
  </div>
</div>

<div id="offline-banner">&#9888; Vex server offline &mdash; running on cached data</div>

<!-- LAYOUT -->
<div id="layout">

  <!-- LEFT PANEL -->
  <div class="panel" id="panel-left">
    <div>
      <div class="section-header">
        <span class="section-title">Team</span>
      </div>
      <div class="agent-cards-wrap" id="agent-cards"></div>
    </div>
    <div id="todo-section">
      <div class="section-header">
        <span class="section-title">Tasks</span>
      </div>
      <div class="todo-input-row">
        <input class="todo-input" id="todo-input" placeholder="Add a task..." type="text">
      </div>
      <div class="todo-filters">
        <button class="todo-filter-btn active" data-filter="all">All</button>
        <button class="todo-filter-btn" data-filter="active">Active</button>
        <button class="todo-filter-btn" data-filter="done">Done</button>
      </div>

<script>
// ════════════════════════════════════════════

var DEFAULT_SERVER = 'https://cnc.tail341a56.ts.net';

function getServer() {
  var s = loadSettings();
  return (s && s.serverUrl) ? s.serverUrl : DEFAULT_SERVER;
}

// ── SETTINGS ──
function loadSettings() {

}
function saveSettings(obj) { localStorage.setItem('gw_settings', JSON.stringify(obj)); }

var DEFAULT_FINANCIALS = { mrr: 0, subscribers: 0, etsySales: 0, etsyUnits: 0, mrrHistory: [] };
function loadFinancials() {
  try { return Object.assign({}, DEFAULT_FINANCIALS, JSON.parse(localStorage.getItem('gw_financials') || '{}')); }
  catch(e) { return Object.assign({}, DEFAULT_FINANCIALS); }
}
function saveFinancials(obj) { localStorage.setItem('gw_financials', JSON.stringify(obj)); }

// ── UTILITY ──
function escHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }

function timeAgo(ts) {
  if (!ts) return '';
  var d = new Date(ts), now = Date.now();
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 86400*7) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString();
}

function nowHHMM() {
  var d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

// ── MARKDOWN RENDERER (inline, no deps) ──
function renderMarkdown(text) {
  if (!text) return '';
  // Preserve code blocks before escaping
  var codeBlocks = [];
  text = text.replace(/```([\s\S]*?)```/g, function(_, inner) {
    codeBlocks.push(inner);
    return '\x00CB' + (codeBlocks.length-1) + '\x00';
  });
  // HTML-escape
  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Inline code
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Restore code blocks
  text = text.replace(/\x00CB(\d+)\x00/g, function(_, i) {
    return '<pre><code>' + codeBlocks[parseInt(i)] + '</code></pre>';
  });
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  // Bold + italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // Lists
  text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>)(\n(?!<li>))/g, '<ul>$1</ul>$2');
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Paragraphs
  text = text.replace(/\n\n/g, '</p><p>');
  text = text.replace(/\n/g, '<br>');
  return '<p>' + text + '</p>';
}

// ── CLOCK ──
function updateClock() {
  var now = new Date();
  var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('topbar-clock').textContent =
    days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ' \xB7 ' + h + ':' + m + ':' + s;
}
setInterval(updateClock, 1000);
updateClock();
document.getElementById('vex-init-time').textContent = nowHHMM();

// ── API HELPERS ──
function apiFetch(path) {
  return fetch(getServer() + path).then(function(r) { return r.json(); });
}
function apiPost(path, body) {
  return fetch(getServer() + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}
function apiPatch(path, body) {
  return fetch(getServer() + path, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}
function apiDelete(path) {
  return fetch(getServer() + path, { method: 'DELETE' }).then(function(r) { return r.json(); });
}

var isOnline = false;
function setOnline(val) {

  document.getElementById('chat-status-dot').style.background = val ? 'var(--green-bright)' : 'var(--red-bright)';
}

// ── AGENTS ──
var AGENTS = [
  {id:'vex',  name:'Vex',  role:'CEO',           active:true,  activates:null,  wanders:false},
  {id:'maya', name:'Maya', role:'Market Intel',  active:true,  activates:null,  wanders:false},
  {id:'iris', name:'Iris', role:'Design',        active:true,  activates:null,  wanders:false},
  {id:'rex',  name:'Rex',  role:'Marketing',     active:true,  activates:null,  wanders:false},
  {id:'kai',  name:'Kai',  role:'Development',   active:false, activates:'Real feature backlog + paying subscribers', wanders:false},
  {id:'ren',  name:'Ren',  role:'Operations',    active:false, activates:'First subscriber', wanders:false},
  {id:'leo',  name:'Leo',  role:'Community',     active:false, activates:'Discord or community exists', wanders:false},
  {id:'sage', name:'Sage', role:'Analytics',     active:false, activates:'Enough data to analyze', wanders:false},
  {id:'curt', name:'Curt', role:'HR',            active:true,  activates:null,  wanders:true}
];

var CURT_MESSAGES = ['In a meeting','Filing something','Getting coffee','On a call','Reviewing the TPS reports','Looking busy'];
var curtMsgIdx = 0;

var agentStates = {};
(function initStates() {
  AGENTS.forEach(function(a) {
    agentStates[a.id] = { status: a.active ? 'idle' : 'slot_open', current: null, last: null };
  });
})();

function renderAgentCards() {
  var container = document.getElementById('agent-cards');
  container.innerHTML = AGENTS.map(function(a) {
    var st = agentStates[a.id] || {};
    var dotClass = 'grey';
    if (a.wanders) dotClass = 'working';
    else if (!a.active) dotClass = 'grey';
    else if (st.status === 'working') dotClass = 'working';
    else dotClass = 'online';

    var cardCls = 'agent-card';
    if (!a.active) cardCls += ' slot-open';
    if (st.status === 'working') cardCls += ' working';

    var body = '';
    if (!a.active) {
      body = '<div class="agent-activates">Activates when: ' + escHtml(a.activates) + '</div>';
    } else if (a.wanders) {
      body = '<div class="agent-current">&#128205; ' + CURT_MESSAGES[curtMsgIdx % CURT_MESSAGES.length] + '</div>';
    } else {
      body = '<div class="agent-current">Current: ' + escHtml(st.current || 'Idle') + '</div>';
      if (st.last) body += '<div class="agent-last">Last: ' + escHtml(st.last) + '</div>';
    }

    return '<div class="' + cardCls + '" data-agent="' + a.id + '">' +
      '<div class="agent-card-top">' +
        '<div><div class="agent-name">' + escHtml(a.name) + '</div><div class="agent-role">' + escHtml(a.role) + '</div></div>' +
        '<div class="status-dot ' + dotClass + '"></div>' +
      '</div>' + body +
    '</div>';
  }).join('');

  container.querySelectorAll('.agent-card:not(.slot-open)').forEach(function(card) {
    card.addEventListener('click', function() { openAgentModal(card.getAttribute('data-agent')); });
  });
}

setInterval(function() { curtMsgIdx++; renderAgentCards(); }, 30000);

// ── TODOS ──
var todoFilter = 'all';
var todos = [];

function loadTodosFromStorage() {
  try { return JSON.parse(localStorage.getItem('gw_todos') || '[]'); } catch(e) { return []; }
}
function saveTodosToStorage(arr) { localStorage.setItem('gw_todos', JSON.stringify(arr)); }

function renderTodos() {
  var list = document.getElementById('todo-list');
  var now = Date.now();
  // Prune completed > 7 days
  todos = todos.filter(function(t) {
    if (t.status === 'completed' && t.completed) {
      return (now - new Date(t.completed).getTime()) < 7 * 86400000;
    }
    return true;
  });

  var filtered = todos.filter(function(t) {
    if (todoFilter === 'active') return t.status !== 'completed';
    if (todoFilter === 'done')   return t.status === 'completed';
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No tasks yet</div>';
    return;
  }

  list.innerHTML = filtered.map(function(t) {
    var done = t.status === 'completed';
    return '<div class="todo-item' + (done ? ' done' : '') + '">' +
      '<input type="checkbox" ' + (done ? 'checked' : '') + ' data-id="' + escAttr(String(t.id)) + '">' +
      '<span class="todo-text">' + escHtml(t.text) + '</span>' +
      '<div class="todo-meta">' +
        '<span class="todo-by-chip">' + escHtml(t.added_by || 'sam') + '</span>' +
        '<span class="todo-time">' + timeAgo(t.created) + '</span>' +
        '<button class="todo-del" data-id="' + escAttr(String(t.id)) + '">&times;</button>' +
      '</div>' +
    '</div>';
  }).join('');

  list.querySelectorAll('input[type="checkbox"]').forEach(function(cb) {
    cb.addEventListener('change', function() {
      var id = cb.getAttribute('data-id');
      var todo = todos.find(function(t) { return String(t.id) === String(id); });
      if (todo) {
        todo.status = cb.checked ? 'completed' : 'active';
        todo.completed = cb.checked ? new Date().toISOString() : null;
        saveTodosToStorage(todos);
        renderTodos();
        apiPatch('/todo/' + id, { status: todo.status }).catch(function(){});
      }
    });
  });

  list.querySelectorAll('.todo-del').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var id = btn.getAttribute('data-id');
      todos = todos.filter(function(t) { return String(t.id) !== String(id); });
      saveTodosToStorage(todos);
      renderTodos();
      apiDelete('/todo/' + id).catch(function(){});
    });
  });
}

function addTodo(text) {
  if (!text.trim()) return;
  var newTodo = { id: 'local_' + Date.now(), text: text.trim(), added_by: 'sam', status: 'active', created: new Date().toISOString(), completed: null };
  todos.unshift(newTodo);
  saveTodosToStorage(todos);
  renderTodos();
  apiPost('/todo', { text: text.trim(), added_by: 'sam' }).then(function(r) {
    if (r && r.id) {
      var idx = todos.findIndex(function(t) { return t.id === newTodo.id; });
      if (idx >= 0) { todos[idx].id = r.id; saveTodosToStorage(todos); }
    }
  }).catch(function(){});
}

function loadTodosFromServer() {
  apiFetch('/todo').then(function(serverTodos) {
    if (!Array.isArray(serverTodos)) return;
    var localOnly = (loadTodosFromStorage()).filter(function(t) { return String(t.id).startsWith('local_'); });
    todos = serverTodos.concat(localOnly);
    saveTodosToStorage(todos);
    renderTodos();
  }).catch(function() {
    todos = loadTodosFromStorage();
    renderTodos();
  });
}

// Todo input
document.getElementById('todo-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    addTodo(this.value);
    this.value = '';
  }
});

// Todo filter buttons
document.querySelectorAll('.todo-filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.todo-filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    todoFilter = btn.getAttribute('data-filter');
    renderTodos();
  });
});

// ── HEALTH / COST POLLS ──
var costData = null;

function pollHealth() {

}

function pollCost() {
  apiFetch('/cost').then(function(data) {
    costData = data;
    var todayCost = data.today && data.today.cost ? data.today.cost : '$0.00';
    document.getElementById('cost-badge').textContent = todayCost + ' today';

    renderFinancials(true);

// ── TASK POLL → AGENT STATES ──
function pollTasks() {
  apiFetch('/tasks').then(function(tasks) {
    setOnline(true);
    var agentRunning = {};
    tasks.forEach(function(t) {
      if (t.status === 'running' || t.status === 'queued') {
        var title = t.title.toLowerCase();
        if (title.startsWith('research:') || title.startsWith('launch:')) agentRunning['maya'] = t.title;
        if (title.startsWith('rex:')) agentRunning['rex'] = t.title;
      }
    });
    AGENTS.forEach(function(a) {
      if (!a.active || a.wanders) return;
      if (agentRunning[a.id]) {
        agentStates[a.id].status = 'working';
        agentStates[a.id].current = agentRunning[a.id];
      } else {
        if (agentStates[a.id].status === 'working') agentStates[a.id].last = 'just now';
        agentStates[a.id].status = 'idle';
        agentStates[a.id].current = null;
      }
    });
    renderAgentCards();
  }).catch(function() { setOnline(false); });
}

// ── BRIEFING ──
function loadBriefing(forceExpand) {
  apiFetch('/brief').then(function(data) {
    var header = document.getElementById('briefing-date');
    var body   = document.getElementById('briefing-body');
    var text   = document.getElementById('briefing-text');
    var toggle = document.getElementById('briefing-toggle');

    if (!data.briefing || data.briefing === 'No briefing yet.') {
      header.textContent = 'Daily Briefing';
      text.textContent = 'No briefing generated yet — Vex briefs at 6am';
      text.className = 'empty-state';
      return;
    }
    header.textContent = '📅 Briefing — ' + (data.date || '');
    text.textContent = data.briefing;
    text.className = '';

    var seen = localStorage.getItem('gw_seen_briefing');
    if (seen === data.date && !forceExpand) {
      body.classList.add('collapsed');
      toggle.textContent = '▼';
    } else {
      body.classList.remove('collapsed');
      toggle.textContent = '▲';
      localStorage.setItem('gw_seen_briefing', data.date);
    }
  }).catch(function() {
    document.getElementById('briefing-text').textContent = 'No briefing generated yet — Vex briefs at 6am';
    document.getElementById('briefing-text').className = 'empty-state';
  });
}

document.getElementById('briefing-card').addEventListener('click', function(e) {

  var body   = document.getElementById('briefing-body');
  var toggle = document.getElementById('briefing-toggle');
  body.classList.toggle('collapsed');
  toggle.textContent = body.classList.contains('collapsed') ? '▼' : '▲';
});
document.getElementById('briefing-refresh').addEventListener('click', function(e) {
  e.stopPropagation();
  document.getElementById('briefing-text').textContent = 'Refreshing...';
  loadBriefing(true);
});

var activityEntries = [];
var lastActivityId = 0;
var feedCleared = false;

function agentFeedColorClass(agent, type) {
  if (type === 'error') return 'error';
  var map = { vex:'vex', maya:'maya', iris:'iris', rex:'rex', system:'system' };
  return map[(agent||'').toLowerCase()] || 'system';
}

function fmtFeedTime(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
}

function renderFeed() {
  var feed = document.getElementById('activity-feed');
  if (activityEntries.length === 0) {
    feed.innerHTML = '<div class="empty-state">No activity yet</div>';
    return;
  }
  var wasAtBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 40;
  var toShow = activityEntries.slice(-100);
  feed.innerHTML = toShow.map(function(e) {
    var cls = agentFeedColorClass(e.agent, e.type);
    return '<div class="feed-entry type-' + escHtml(e.type||'info') + '">' +
      '<span class="feed-time">[' + fmtFeedTime(e.timestamp) + ']</span>' +
      '<span class="feed-agent ' + cls + '">' + escHtml((e.agent||'SYS').toUpperCase().substring(0,6)) + '</span>' +
      '<span class="feed-msg">' + escHtml(e.message) + '</span>' +
    '</div>';
  }).join('');
  if (wasAtBottom) feed.scrollTop = feed.scrollHeight;
}

function pollActivity() {
  apiFetch('/activity').then(function(data) {
    if (!Array.isArray(data) || data.length === 0) { renderFeed(); return; }
    var newEntries = data.filter(function(e) { return e.id > lastActivityId; });
    if (newEntries.length > 0) {
      activityEntries = activityEntries.concat(newEntries);
      if (activityEntries.length > 100) activityEntries = activityEntries.slice(-100);
      lastActivityId = data[data.length-1].id;
      if (!feedCleared) renderFeed();
    }
    if (activityEntries.length === 0) renderFeed();
  }).catch(function(){});
}

document.getElementById('clear-feed-btn').addEventListener('click', function() {
  feedCleared = true;
  activityEntries = [];
  document.getElementById('activity-feed').innerHTML = '<div class="empty-state">Feed cleared</div>';
});

// ── VAULT ──
var vaultFiles = [];
var vaultModalRaw = '';

var VAULT_ICONS = { research:'📊', decisions:'📋', products:'📦', marketing:'📣', daily:'📅', company:'🏢' };

function vaultIcon(filepath) {
  var folder = (filepath || '').split('/')[0];
  return VAULT_ICONS[folder] || '📄';
}

function renderVault() {
  var grid = document.getElementById('vault-grid');
  if (!vaultFiles || vaultFiles.length === 0) {
    grid.innerHTML = '<div class="empty-state">No vault files yet</div>';
    return;
  }
  grid.innerHTML = vaultFiles.map(function(f) {
    return '<div class="vault-file-card" data-path="' + escAttr(f.filepath) + '">' +
      '<span class="vault-icon">' + vaultIcon(f.filepath) + '</span>' +
      '<span class="vault-name" title="' + escAttr(f.name) + '">' + escHtml(f.name.replace('.md','')) + '</span>' +
      '<div class="vault-meta">' +
        '<span class="agent-chip chip-' + escHtml(f.agent||'vex') + '">' + escHtml(f.agent||'vex') + '</span>' +
        '<span class="vault-mtime">' + timeAgo(f.mtime) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
  grid.querySelectorAll('.vault-file-card').forEach(function(card) {
    card.addEventListener('click', function() { openVaultModal(card.getAttribute('data-path')); });
  });
  document.getElementById('vault-updated').textContent = 'updated ' + timeAgo(new Date().toISOString());
}

function pollVault() {
  apiFetch('/vault/recent').then(function(data) {
    if (!Array.isArray(data)) return;
    vaultFiles = data;
    renderVault();
  }).catch(function(){});
}

// ── FINANCIALS ──
var costToday = 0, costMonth = 0;

function renderFinancials(costOnly) {
  var fin = loadFinancials();
  if (costData) {
    costToday = parseFloat(((costData.today && costData.today.cost) || '$0').replace('$','')) || 0;
    costMonth = parseFloat(((costData.this_month && costData.this_month.cost) || '$0').replace('$','')) || 0;
  }
  var mrr  = parseFloat(fin.mrr) || 0;
  var subs = parseInt(fin.subscribers) || 0;
  var etsy = parseFloat(fin.etsySales) || 0;
  var units = parseInt(fin.etsyUnits) || 0;
  var goal = 12000;
  var pct  = Math.min(100, Math.round((mrr / goal) * 100));

  // Top bar MRR badge
  var mrrBadge = document.getElementById('mrr-badge');
  mrrBadge.textContent = '$' + mrr.toLocaleString() + ' MRR';
  mrrBadge.className = mrr > 0 ? 'positive' : '';

  if (costOnly) {
    var ctEl = document.getElementById('metric-val-cost-today');
    var cmEl = document.getElementById('metric-val-cost-month');
    if (ctEl) { ctEl.textContent = '$' + costToday.toFixed(4); ctEl.className = 'metric-value' + (costToday >= 1.0 ? ' red' : costToday >= 0.5 ? ' amber' : ''); }
    if (cmEl) { cmEl.textContent = '$' + costMonth.toFixed(4); }
    return;
  }

  var remoteDate = 'No data yet';
  if (mrr > 0 && fin.mrrHistory && fin.mrrHistory.length >= 2) {
    var hist = fin.mrrHistory.slice(-2);
    var growth = hist[1].value - hist[0].value;
    if (growth > 0) {
      var monthsNeeded = Math.ceil((goal - mrr) / growth);
      var est = new Date(); est.setMonth(est.getMonth() + monthsNeeded);
      remoteDate = est.toLocaleDateString('en-US', { month:'short', year:'numeric' });
    }
  }

  var metrics = [
    { id:'mrr',        label:'MRR',             value:'$'+mrr.toLocaleString(),   key:'mrr',         valClass:mrr>0?'positive':'amber', editable:true },
    { id:'subs',       label:'Subscribers',     value:String(subs),               key:'subscribers', valClass:'', editable:true },
    { id:'etsy',       label:'Etsy Sales (mo)', value:'$'+etsy.toFixed(2),        key:'etsySales',   valClass:'', editable:true },
    { id:'units',      label:'Etsy Units',      value:String(units),              key:'etsyUnits',   valClass:'', editable:true },
    { id:'cost-today', label:'API Cost Today',  value:'$'+costToday.toFixed(4),   key:null, valClass:costToday>=1.0?'red':costToday>=0.5?'amber':'', editable:false, ro:true },
    { id:'cost-month', label:'API Cost Month',  value:'$'+costMonth.toFixed(4),   key:null, valClass:'', editable:false, ro:true },
    { id:'goal',       label:'Revenue Goal',    value:'$12,000 / mo',             key:null, valClass:'', editable:false, ro:true, fullWidth:true, progress:pct },
    { id:'remote',     label:'Est. Remote Date',value:remoteDate,                 key:null, valClass:'', editable:false, ro:true }
  ];

  var grid = document.getElementById('financials-grid');
  grid.innerHTML = metrics.map(function(m) {
    var cls = 'metric-card' + (m.ro ? ' readonly' : '') + (m.fullWidth ? ' full-width' : '');
    var prog = (m.progress !== undefined) ?
      '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + m.progress + '%"></div></div>' +
      '<div style="font-size:10px;color:var(--text-secondary);margin-top:4px">' + m.progress + '% of goal</div>' : '';
    return '<div class="' + cls + '" data-key="' + escAttr(m.key||'') + '" id="mcard-' + m.id + '">' +
      '<div class="metric-label">' + m.label + '</div>' +
      '<div class="metric-value ' + m.valClass + '" id="metric-val-' + m.id + '">' + m.value + '</div>' +
      prog +
    '</div>';
  }).join('');

  metrics.filter(function(m) { return m.editable; }).forEach(function(m) {
    var card = document.getElementById('mcard-' + m.id);
    if (!card) return;
    card.addEventListener('click', function() {
      var valEl = document.getElementById('metric-val-' + m.id);
      var cur = loadFinancials()[m.key] || 0;
      valEl.innerHTML = '<input class="metric-input" type="text" value="' + escAttr(String(cur)) + '">';
      var inp = valEl.querySelector('input');
      inp.focus(); inp.select();
      function saveMetric() {
        var num = parseFloat((inp.value||'0').replace(/[^0-9.]/g,'')) || 0;
        var fin2 = loadFinancials();
        fin2[m.key] = num;
        if (m.key === 'mrr') {
          fin2.mrrHistory = fin2.mrrHistory || [];
          fin2.mrrHistory.push({ date: new Date().toISOString().split('T')[0], value: num });
        }
        saveFinancials(fin2);
        renderFinancials(false);
      }
      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') saveMetric();
        if (e.key === 'Escape') renderFinancials(false);
      });
      inp.addEventListener('blur', saveMetric);
    });
  });
}

// ── CHAT ──
var chatMessages = [];
var isWaitingForVex = false;

function loadChatFromSession() {
  try { chatMessages = JSON.parse(sessionStorage.getItem('gw_chat') || '[]'); } catch(e) { chatMessages = []; }
}
function saveChatToSession() {
  sessionStorage.setItem('gw_chat', JSON.stringify(chatMessages.slice(-50)));
}

function appendMessage(role, text, noSave) {
  var msgs = document.getElementById('chat-messages');
  var typing = document.getElementById('typing-indicator');
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  var bubble;
  if (role === 'vex') {
    bubble = '<div class="msg-bubble">' + renderMarkdown(text) + '</div>';
  } else {
    bubble = '<div class="msg-bubble">' + escHtml(text).replace(/\n/g,'<br>') + '</div>';
  }
  div.innerHTML = '<div class="msg-label">' + (role === 'vex' ? 'Vex' : 'Sam') + '</div>' + bubble + '<div class="msg-time">' + nowHHMM() + '</div>';
  msgs.insertBefore(div, typing);
  msgs.scrollTop = msgs.scrollHeight;
  if (!noSave) {
    chatMessages.push({ role: role === 'vex' ? 'assistant' : 'user', content: text });
    saveChatToSession();
  }
}

function showTyping(show) {
  document.getElementById('typing-indicator').style.display = show ? 'block' : 'none';
  if (show) { var m = document.getElementById('chat-messages'); m.scrollTop = m.scrollHeight; }
}

function sendMessage(text) {
  if (!text.trim() || isWaitingForVex) return;
  appendMessage('sam', text);
  var chatInput = document.getElementById('chat-input');
  chatInput.value = '';
  autoResizeInput();
  isWaitingForVex = true;
  showTyping(true);

  apiPost('/chat', { messages: chatMessages.slice(-20) }).then(function(data) {
    showTyping(false);
    isWaitingForVex = false;
    if (data.reply) appendMessage('vex', data.reply);
    if (data.mayaQueued) {
      agentStates['maya'] = { status: 'working', current: 'Task queued by Vex', last: null };
      renderAgentCards();
      activityEntries.push({ id: Date.now(), agent: 'vex', message: 'Vex → Maya: task queued', type: 'task_start', timestamp: new Date().toISOString() });
      if (!feedCleared) renderFeed();
    }
  }).catch(function() {
    showTyping(false);
    isWaitingForVex = false;
    appendMessage('vex', 'Connection error. Is the server running?', true);
  });
}

// Quick actions
document.getElementById('quick-actions').querySelectorAll('.qa-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var action = btn.getAttribute('data-action');
    if (action === 'briefing') {
      apiFetch('/brief').then(function(d) {
        var text = d.briefing ? '**Briefing — ' + (d.date||'today') + '**\n\n' + d.briefing : 'No briefing yet.';
        appendMessage('vex', text, true);
      }).catch(function() { appendMessage('vex', 'Could not load briefing.', true); });
    } else if (action === 'cost') {
      apiFetch('/cost').then(function(d) {
        var text = '**Cost Report**\n\nToday: ' + ((d.today&&d.today.cost)||'$0.00') +
          '\nThis week: ' + ((d.this_week&&d.this_week.cost)||'$0.00') +
          '\nThis month: ' + ((d.this_month&&d.this_month.cost)||'$0.00') +
          '\nProjected monthly: ' + (d.projected_monthly||'$0.00');
        appendMessage('vex', text, true);
      }).catch(function() { appendMessage('vex', 'Could not load cost data.', true); });
    } else if (action === 'product') {
      sendMessage('Suggest a new product idea for Groundwork');
    } else if (action === 'maya') {
      sendMessage('What is Maya working on right now?');
    } else if (action === 'team') {
      sendMessage('Give me a team status update');
    }
  });
});

var chatInput = document.getElementById('chat-input');
function autoResizeInput() {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 88) + 'px';
}
chatInput.addEventListener('input', autoResizeInput);
chatInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(chatInput.value); }
});
document.getElementById('chat-send').addEventListener('click', function() { sendMessage(chatInput.value); });

// ── MIC ──
var recognition = null;
var isRecording = false;
var micBtn = document.getElementById('mic-btn');

if (window.SpeechRecognition || window.webkitSpeechRecognition) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = function(e) {
    chatInput.value += e.results[0][0].transcript;
    autoResizeInput();
  };
  recognition.onend = function() { isRecording = false; micBtn.classList.remove('recording'); };
  recognition.onerror = function() { isRecording = false; micBtn.classList.remove('recording'); };
} else {
  micBtn.style.display = 'none';
}

micBtn.addEventListener('click', function() {
  if (!recognition) return;
  if (isRecording) { recognition.stop(); isRecording = false; micBtn.classList.remove('recording'); }
  else { recognition.start(); isRecording = true; micBtn.classList.add('recording'); }
});

// ── AGENT MODAL ──
function openAgentModal(agentId) {
  var agent = AGENTS.find(function(a) { return a.id === agentId; });
  if (!agent) return;
  document.getElementById('agent-modal-name').textContent = agent.name;
  document.getElementById('agent-modal-role').textContent = agent.role;
  var body = document.getElementById('agent-modal-body');

  if (!agent.active) {
    body.innerHTML = '<div class="modal-slot-msg"><strong>Slot open.</strong><br>Activates when: ' + escHtml(agent.activates) + '</div>';
  } else if (agent.wanders) {
    body.innerHTML = '<div class="modal-slot-msg">Curt is wandering. Currently: ' + escHtml(CURT_MESSAGES[curtMsgIdx % CURT_MESSAGES.length]) + '</div>';
  } else {
    var hints = { maya:'Research topic or market to analyze', iris:'Design brief for image generation', rex:'Product name and marketing context', vex:'Task or question for Vex' };
    body.innerHTML =
      '<label class="modal-label">Task</label>' +
      '<textarea id="agent-task-input" placeholder="' + escAttr(hints[agentId] || 'What should ' + agent.name + ' work on?') + '" rows="4"></textarea>' +
      '<button class="modal-submit" id="agent-task-submit">Send to ' + escHtml(agent.name) + '</button>' +
      '<div id="agent-task-result" style="margin-top:10px;font-size:12px;color:var(--green-bright);display:none"></div>';

    document.getElementById('agent-task-submit').addEventListener('click', function() {
      var text = document.getElementById('agent-task-input').value.trim();
      if (!text) return;
      var btn = document.getElementById('agent-task-submit');
      btn.disabled = true; btn.textContent = 'Sending...';
      var result = document.getElementById('agent-task-result');

      if (agentId === 'vex') { closeModal('agent-modal'); sendMessage(text); return; }

      var endpoints = { maya:['/research',{query:text}], iris:['/design',{brief:text}], rex:['/marketing',{product_name:'Manual',listing_copy:text}] };
      var ep = endpoints[agentId];
      if (!ep) return;

      agentStates[agentId] = { status:'working', current:text.substring(0,40), last:null };
      renderAgentCards();

      apiPost(ep[0], ep[1]).then(function(r) {
        result.style.display = 'block';
        result.textContent = 'Queued. Task ID: ' + (r.task_id || r.id || '—');
        btn.textContent = 'Sent ✓';
      }).catch(function() {
        result.style.display = 'block';
        result.style.color = 'var(--red-bright)';
        result.textContent = 'Error — check server connection';
        btn.disabled = false; btn.textContent = 'Try again';
      });
    });
  }
  document.getElementById('agent-modal').classList.add('active');
}

// ── VAULT MODAL ──
function openVaultModal(filepath) {
  document.getElementById('vault-modal-path').textContent = filepath;
  document.getElementById('vault-modal-meta').innerHTML = '';
  document.getElementById('vault-modal-content').textContent = 'Loading...';
  vaultModalRaw = '';
  document.getElementById('vault-modal').classList.add('active');

  apiFetch('/vault/file?path=' + encodeURIComponent(filepath)).then(function(data) {
    vaultModalRaw = data.content || '';
    var folder = filepath.split('/')[0];
    var agentMap = { research:'maya', marketing:'rex', products:'maya', daily:'vex', decisions:'vex', company:'vex' };
    var ag = agentMap[folder] || 'vex';
    document.getElementById('vault-modal-meta').innerHTML = '<span class="agent-chip chip-' + ag + '">' + ag + '</span>';
    var content = document.getElementById('vault-modal-content');
    content.style.whiteSpace = 'normal';
    content.innerHTML = renderMarkdown(data.content || '');
  }).catch(function() {
    document.getElementById('vault-modal-content').textContent = 'Could not load file.';
  });
}

document.getElementById('vault-copy-btn').addEventListener('click', function() {
  if (navigator.clipboard && vaultModalRaw) {
    navigator.clipboard.writeText(vaultModalRaw).then(function() {
      document.getElementById('vault-copy-btn').textContent = 'Copied!';
      setTimeout(function() { document.getElementById('vault-copy-btn').textContent = 'Copy Markdown'; }, 2000);
    });
  }
});

// ── SETTINGS MODAL ──
document.getElementById('settings-btn').addEventListener('click', function() {
  document.getElementById('settings-server-url').value = loadSettings().serverUrl || DEFAULT_SERVER;
  document.getElementById('settings-modal').classList.add('active');
});
document.getElementById('settings-save').addEventListener('click', function() {
  var s = loadSettings();
  s.serverUrl = document.getElementById('settings-server-url').value.trim() || DEFAULT_SERVER;
  saveSettings(s);
  closeModal('settings-modal');
});
document.getElementById('settings-clear-chat').addEventListener('click', function() {
  sessionStorage.removeItem('gw_chat');
  chatMessages = [];
  var msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '<div class="msg vex"><div class="msg-label">Vex</div><div class="msg-bubble">Chat cleared. What\'s next?</div><div class="msg-time">' + nowHHMM() + '</div></div>' +
    '<div id="typing-indicator" style="display:none"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
  closeModal('settings-modal');
});
document.getElementById('settings-clear-financials').addEventListener('click', function() {
  localStorage.removeItem('gw_financials');
  renderFinancials(false);
  closeModal('settings-modal');
});

// ── MODAL CLOSE ──
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.getElementById('agent-modal-close').addEventListener('click', function() { closeModal('agent-modal'); });
document.getElementById('vault-modal-close').addEventListener('click', function() { closeModal('vault-modal'); });
document.getElementById('settings-modal-close').addEventListener('click', function() { closeModal('settings-modal'); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') ['agent-modal','vault-modal','settings-modal'].forEach(function(id) { closeModal(id); });
});
['agent-modal','vault-modal','settings-modal'].forEach(function(id) {
  document.getElementById(id).addEventListener('click', function(e) { if (e.target === this) closeModal(id); });
});

// ── INIT ──
renderAgentCards();
renderFinancials(false);
loadTodosFromServer();
loadBriefing(false);
loadChatFromSession();
chatMessages.forEach(function(m) {
  appendMessage(m.role === 'assistant' ? 'vex' : 'sam', m.content, true);
});

pollHealth();
pollTasks();
pollActivity();
pollVault();
pollCost();

setInterval(pollHealth,   30000);
setInterval(pollTasks,    10000);
setInterval(pollActivity,  5000);
setInterval(pollVault,    30000);
setInterval(pollCost,    300000);
setInterval(function() { loadBriefing(false); }, 300000);

</script>
